<!DOCTYPE html>
<html>
<head>
  <title>Budget Dashboard</title>

  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 100%; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }
  </style>

</head>

<body>

<h1>✅ Budget Dashboard</h1>

<h3>Paste Excel Data</h3>

<textarea id="data" rows="6" placeholder="Example:
2026-06-01    Groceries    50
2026-06-02    Rent    1,200"></textarea>

<br><br>

<button onclick="importData()">Import Data</button>

<h2>Total Spend: $<span id="total">0</span></h2>

<h2>Transactions</h2>

<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Category</th>
      <th>Amount</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<h2>Spend by Category</h2>

<ul id="categoryTotals"></ul>

<script>

let expenses = [];

function importData() {
  const text = document.getElementById("data").value;

  const rows = text.split(/\r?\n/);

  for (let row of rows) {

    const cols = row.split("\t"); // ✅ ONLY split on TAB

    if (cols.length < 3) continue;

    const cleanAmount = cols[2]
      .replace(/,/g, "")           // remove commas
      .replace(/[^0-9.-]/g, "")    // remove $ and symbols
      .trim();

    const item = {
      date: cols[0].trim(),
      category: cols[1].trim(),
      amount: parseFloat(cleanAmount)
    };

    if (!item.date || !item.category || isNaN(item.amount)) continue;

    expenses.push(item);
  }

  render();
}

function render() {

  let total = 0;
  const table = document.getElementById("tableBody");
  const categoryMap = {};

  table.innerHTML = "";

  expenses.forEach(e => {

    total += e.amount;

    // ✅ Add table row
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${e.date}</td>
      <td>${e.category}</td>
      <td>${e.amount.toFixed(2)}</td>
    `;

    table.appendChild(row);

    // ✅ Category totals
    categoryMap[e.category] =
      (categoryMap[e.category] || 0) + e.amount;
  });

  document.getElementById("total").innerText = total.toFixed(2);

  // ✅ Render category totals
  const list = document.getElementById("categoryTotals");
  list.innerHTML = "";

  for (let cat in categoryMap) {
    const li = document.createElement("li");
    li.innerText = `${cat}: $${categoryMap[cat].toFixed(2)}`;
    list.appendChild(li);
  }
}

</script>

</body>
</html>
