<!DOCTYPE html>
<html>
<head>
  <title>Budget Dashboard (FINAL FIX)</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 100%; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }
    .red { color: red; font-weight: bold; }
    .green { color: green; font-weight: bold; }
  </style>
</head>
<body>

<h1>✅ Budget Dashboard</h1>

<textarea id="data" rows="6"></textarea>
<br><br>
<button onclick="importData()">Import Data</button>

<h2>Total: $<span id="total">0</span></h2>

<table>
  <tbody id="tableBody"></tbody>
</table>

<script>
let expenses = [];

function importData() {
  const text = document.getElementById("data").value;

  // ✅ CRITICAL FIX: trim + correct newline split
  const rows = text.trim().split(/\r?\n/);

  expenses = [];

  for (let row of rows) {

    // ✅ SPLIT on tabs OR multiple spaces
    const cols = row.trim().split(/\t+| {2,}/);

    if (cols.length < 3) continue;

    const cleanAmount = cols[2]
      .replace(/,/g, "")
      .replace(/[^0-9.-]/g, "")
      .trim();

    const amount = parseFloat(cleanAmount);

    if (isNaN(amount)) continue;

    expenses.push(amount);
  }

  let total = expenses.reduce((a, b) => a + b, 0);

  document.getElementById("total").innerText = total.toFixed(2);
}
</script>

</body>
</html>
